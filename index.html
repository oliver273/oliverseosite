<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oliver SEO - Digital Marketing Services</title>
    <meta name="description" content="We help businesses grow online with Google Ads, professional websites, and local SEO that actually converts. Serving businesses nationwide.">
    <script type="module" crossorigin src="./assets/index-CMrXv12G.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-D9qoWfOO.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function(){
        var injected=false;
        function tryInject(){
          if(injected)return;
          // Find all nav/header links or buttons with text "Contact"
          var all=document.querySelectorAll('nav a, nav button, header a, header button');
          var contactEls=[];
          all.forEach(function(el){if(el.textContent.trim()==='Contact')contactEls.push(el);});
          if(!contactEls.length)return;
          injected=true;

          contactEls.forEach(function(contactEl){
            // Skip if Portfolio link already exists in same parent
            var parent=contactEl.parentElement;
            if(!parent)return;
            var already=false;
            parent.querySelectorAll('a').forEach(function(a){if(a.textContent.trim()==='Portfolio')already=true;});
            if(already)return;

            var link=document.createElement('a');
            link.href='/portfolio.html';
            link.textContent='Portfolio';
            link.className=contactEl.className;
            link.style.cssText='cursor:pointer;text-decoration:none;';
            parent.insertBefore(link,contactEl);
          });
        }

        // Try immediately in case React already rendered
        tryInject();
        // Also observe for React hydration
        var obs=new MutationObserver(function(){tryInject();});
        obs.observe(document.body,{childList:true,subtree:true});
        // Belt-and-suspenders: try again after short delays
        setTimeout(tryInject,500);
        setTimeout(tryInject,1500);
        setTimeout(function(){tryInject();obs.disconnect();},4000);
      })();
    </script>
  </body>
</html>
