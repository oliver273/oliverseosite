<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oliver SEO - Digital Marketing Services</title>
    <meta name="description" content="We help businesses grow online with Google Ads, professional websites, and local SEO that actually converts. Serving businesses nationwide.">
    <script type="module" crossorigin src="./assets/index-CMrXv12G.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-D9qoWfOO.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function(){
        var injected=false;
        var obs=new MutationObserver(function(){
          if(injected)return;
          var navButtons=document.querySelectorAll('nav button, header button');
          var contactBtn=null;
          navButtons.forEach(function(b){
            if(b.textContent.trim()==='Contact')contactBtn=b;
          });
          if(!contactBtn)return;
          injected=true;
          obs.disconnect();

          var desktopNav=contactBtn.closest('div.hidden, div.lg\\:flex, nav');
          if(!desktopNav)desktopNav=contactBtn.parentElement;

          var link=document.createElement('a');
          link.href='/portfolio.html';
          link.textContent='Portfolio';
          link.className=contactBtn.className;
          link.style.cssText='cursor:pointer;text-decoration:none;';
          contactBtn.parentElement.insertBefore(link,contactBtn.nextSibling);

          var mobileMenus=document.querySelectorAll('[class*="lg:hidden"], [class*="md:hidden"]');
          mobileMenus.forEach(function(menu){
            var mobileLinks=menu.querySelectorAll('button, a');
            mobileLinks.forEach(function(ml){
              if(ml.textContent.trim()==='Contact'){
                var mLink=document.createElement('a');
                mLink.href='/portfolio.html';
                mLink.textContent='Portfolio';
                mLink.className=ml.className;
                mLink.style.cssText='cursor:pointer;text-decoration:none;';
                ml.parentElement.insertBefore(mLink,ml.nextSibling);
              }
            });
          });
        });
        obs.observe(document.body,{childList:true,subtree:true});
      })();
    </script>
  </body>
</html>
